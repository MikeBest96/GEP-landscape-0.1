version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgres://user:password@db:5432/mydatabase
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: